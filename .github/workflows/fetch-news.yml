name: Fetch game news

# The "timer": runs on a schedule AND can be triggered manually from the Actions tab.
on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours (UTC). Adjust as you like.
  workflow_dispatch: {}       # lets you run it on demand from the Actions tab

permissions:
  contents: write             # allows the job to commit the refreshed data.json

concurrency:
  group: fetch-news
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run fetcher
        env:
          HENRIK_API_KEY: ${{ secrets.HENRIK_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          USE_AI_CLASSIFIER: ${{ vars.USE_AI_CLASSIFIER }}
        run: python3 fetcher.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: refresh game news data [skip ci]"
            git push
          fi
